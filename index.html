<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celta Academy | Hub Futurista</title>
    <style>
        /* --- CSS: DESIGN METÁLICO E FUTURISTA --- */
        :root {
            --dark: #080808;
            --card: #121212;
            --metal: linear-gradient(180deg, #e0e0e0 0%, #707070 100%);
            --accent: #00aaff;
        }

        body {
            background-color: var(--dark);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-bottom: 100px;
        }

        .promo-bar {
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            text-align: center;
            padding: 10px;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        header {
            text-align: center;
            padding: 60px 20px;
            border-bottom: 1px solid #222;
        }

        header h1 { 
            font-size: 3.5em; 
            margin: 0; 
            letter-spacing: 8px; 
            background: var(--metal);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid-cursos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 40px;
        }

        .celta-card {
            background: var(--card);
            border: 1px solid #222;
            padding: 30px;
            border-radius: 4px;
            position: relative;
            transition: 0.3s;
        }

        .celta-card:hover { 
            border-color: #7a7a7a; 
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .vagas-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #c62828;
            font-size: 10px;
            padding: 5px 10px;
            border-radius: 2px;
            font-weight: bold;
        }

        .btn-celta {
            background: var(--metal);
            color: #000;
            border: none;
            width: 100%;
            padding: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- UI DA INTELIGÊNCIA ARTIFICIAL --- */
        #ai-container {
            position: fixed; bottom: 20px; right: 20px; width: 350px;
            background: #111; border: 1px solid #444; border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            z-index: 1000;
        }

        #ai-header { 
            background: #1a1a1a; 
            padding: 15px; 
            font-weight: bold; 
            border-bottom: 1px solid #333; 
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }

        #ai-messages { 
            height: 280px; 
            overflow-y: auto; 
            padding: 15px; 
            font-size: 14px; 
            line-height: 1.6; 
            background: #0d0d0d;
        }

        .ai-input-area { display: flex; border-top: 1px solid #333; }
        .ai-input-area input { 
            flex: 1; background: #000; border: none; color: #fff; padding: 15px; outline: none;
        }
        .ai-input-area button { 
            background: #222; color: #fff; border: none; padding: 15px; cursor: pointer; font-weight: bold;
        }
        .ai-input-area button:hover { background: #333; }
    </style>
</head>
<body>

    <div class="promo-bar">SISTEMA CELTA: MÊS GRÁTIS ATIVADO | VAGAS LIMITADAS PARA MESTRES</div>
    
    <header>
        <h1>CELTA ACADEMY</h1>
        <p style="color: #888; letter-spacing: 2px;">Onde a tecnologia encontra o conhecimento elite</p>
    </header>

    <main id="cursos-grid" class="grid-cursos">
        </main>

    <div id="ai-container">
        <div id="ai-header">
            <span>CELTA IA V2.0</span>
            <span style="color: #00ff00;">● ONLINE</span>
        </div>
        <div id="ai-messages">
            <p style="color: #888;">Bem-vindo, aluno. Selecione um dos 17 cursos para iniciar uma aula imediata com nossa IA ou digite sua dúvida abaixo.</p>
        </div>
        <div class="ai-input-area">
            <input type="text" id="ai-input" placeholder="Pergunte ao Mestre...">
            <button onclick="perguntarIA()">ENVIAR</button>
        </div>
    </div>

    <script>
        /* --- JAVASCRIPT: LÓGICA E INTEGRAÇÃO --- */
        const API_KEY = "key_CYgMeN1tbZPF55mksVqor";

        const cursos = [
            { nome: "Física Quântica", vagasProf: 5 },
            { nome: "Decoração", vagasProf: 12 },
            { nome: "Informática", vagasProf: 2 },
            { nome: "Arquitetura", vagasProf: 8 },
            { nome: "Física", vagasProf: 15 },
            { nome: "Matemática", vagasProf: 7 },
            { nome: "Inglês", vagasProf: 20 },
            { nome: "Espanhol", vagasProf: 18 },
            { nome: "Francês", vagasProf: 10 },
            { nome: "Português", vagasProf: 50 },
            { nome: "Italiano", vagasProf: 9 },
            { nome: "Alemão", vagasProf: 6 },
            { nome: "Grego", vagasProf: 4 },
            { nome: "Latim", vagasProf: 3 },
            { nome: "Culinária", vagasProf: 22 },
            { nome: "Geografia", vagasProf: 14 },
            { nome: "História", vagasProf: 11 }
        ];

        const grid = document.getElementById('cursos-grid');

        // Renderizar Cursos
        cursos.forEach(c => {
            const card = document.createElement('div');
            card.className = 'celta-card';
            card.innerHTML = `
                <div class="vagas-badge">${c.vagasProf}/50 MESTRES</div>
                <h3>${c.nome}</h3>
                <p style="color:#666; font-size: 13px;">Alunos Ilimitados</p>
                <button class="btn-celta" onclick="iniciarAula('${c.nome}')">Assistir Aula IA</button>
            `;
            grid.appendChild(card);
        });

        // Iniciar Aula via IA
        async function iniciarAula(curso) {
            const msgDiv = document.getElementById('ai-messages');
            msgDiv.innerHTML = `<p style="color:var(--accent)">Preparando aula mestre de ${curso}...</p>`;
            chamadaIA(`Dê uma aula introdutória curta e profissional sobre ${curso} em português.`);
        }

        // Pergunta livre no Chat
        async function perguntarIA() {
            const input = document.getElementById('ai-input');
            if (!input.value) return;
            const msg = input.value;
            input.value = '';
            
            const msgDiv = document.getElementById('ai-messages');
            msgDiv.innerHTML += `<p style="border-left: 2px solid #555; padding-left: 10px;"><b>Você:</b> ${msg}</p>`;
            chamadaIA(msg);
        }

        // Conexão Real com a API
        async function chamadaIA(prompt) {
            const msgDiv = document.getElementById('ai-messages');
            try {
                const response = await fetch("https://api-inference.huggingface.co/models/meta-llama/Meta-Llama-3-8B-Instruct", {
                    headers: { 
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    method: "POST",
                    body: JSON.stringify({ inputs: prompt }),
                });
                
                const result = await response.json();
                // Limpeza da resposta para exibir apenas o texto gerado
                let texto = "";
                if(Array.isArray(result)) {
                    texto = result[0].generated_text.replace(prompt, "");
                } else {
                    texto = "Mestre ocupado. Tente novamente em alguns segundos.";
                }

                msgDiv.innerHTML += `<div style="background: #1a1a1a; padding: 10px; border-radius: 5px; margin-top: 10px;">
                    <b style="color: var(--accent)">CELTA IA:</b> ${texto}
                </div>`;
                msgDiv.scrollTop = msgDiv.scrollHeight;
            } catch (e) {
                msgDiv.innerHTML += `<p style="color:red">Erro: Verifique sua conexão ou Key da API.</p>`;
            }
        }
    </script>
</body>
</html>
