<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Celta Academy | Sistema de Elite</title>
    <style>
        :root { --dark: #050505; --card: #111; --gold: #ffd700; --metal: linear-gradient(180deg, #ccc, #666); }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        /* COFRE DE CHAVE (O segredo para o GitHub não matar) */
        #cofre-setup { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.95); z-index: 9999; display: flex; 
            flex-direction: column; align-items: center; justify-content: center;
        }

        /* VITRINE E SALA DE AULA */
        header { padding: 40px; text-align: center; border-bottom: 1px solid #222; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px; }
        .celta-card { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 8px; text-align: center; }
        
        #sala-aula { display: none; padding: 30px; }
        .layout { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .box { background: #161616; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        
        button { background: var(--metal); border: none; padding: 12px; cursor: pointer; font-weight: bold; width: 100%; border-radius: 4px; }
        input { width: 80%; padding: 12px; background: #000; border: 1px solid #444; color: white; margin-bottom: 10px; }
        
        #chat-msgs { height: 200px; overflow-y: auto; background: #000; padding: 10px; margin-bottom: 10px; font-size: 13px; }
    </style>
</head>
<body>

    <div id="cofre-setup">
        <h2 style="color:var(--gold)">🔐 COFRE CELTA</h2>
        <p>Insira sua Chave da IA (Hugging Face) para ativar os 17 cursos:</p>
        <input type="password" id="input-key" placeholder="hf_xxxxxxxxxxxxxxxxx">
        <button onclick="salvarChave()" style="width:200px;">ATIVAR SISTEMA</button>
        <p style="font-size:10px; color:#555;">Sua chave fica salva apenas no seu navegador.</p>
    </div>

    <div id="home">
        <header><h1>CELTA ACADEMY</h1><p>Mestre IA: Aulas, Exercícios e Vídeos</p></header>
        <div class="grid" id="grid-cursos"></div>
    </div>

    <div id="sala-aula">
        <button onclick="voltar()" style="width:100px; margin-bottom:20px;">← VOLTAR</button>
        <div class="layout">
            <div class="col-principal">
                <div class="box">
                    <h2 id="aula-titulo" style="color:var(--gold)"></h2>
                    <div id="aula-texto">Aguardando mestre...</div>
                </div>
                <div class="box">
                    <h3>📝 EXERCÍCIO DA IA</h3>
                    <div id="aula-exercicio">O mestre está formulando as questões...</div>
                </div>
            </div>
            <div class="col-lateral">
                <div class="box">
                    <h4>💬 CHAT COM A IA</h4>
                    <div id="chat-msgs"></div>
                    <input type="text" id="chat-input" placeholder="Tirar dúvida...">
                    <button onclick="perguntarIA()">ENVIAR</button>
                </div>
                <div class="box">
                    <h4>🎥 VÍDEO & PDF</h4>
                    <div id="video-link"></div>
                    <hr>
                    <button onclick="window.print()" style="background:#222; color:#fff; border:1px solid #444;">📄 GERAR PDF DA AULA</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let CHAVE_MESTRA = localStorage.getItem('celta_key');

        // Verifica se já tem a chave salva
        if(CHAVE_MESTRA) document.getElementById('cofre-setup').style.display = 'none';

        function salvarChave() {
            const k = document.getElementById('input-key').value;
            if(k.includes('hf_')) {
                localStorage.setItem('celta_key', k);
                location.reload();
            } else { alert("Chave inválida!"); }
        }

        const cursos = ["Física Quântica", "Decoração", "Informática", "Arquitetura", "Física", "Latim", "Culinária", "Inglês", "Geografia"];
        const grid = document.getElementById('grid-cursos');

        cursos.forEach(c => {
            grid.innerHTML += `<div class="celta-card"><h3>${c}</h3><button onclick="abrirAula('${c}')">ENTRAR NA AULA</button></div>`;
        });

        function abrirAula(nome) {
            document.getElementById('home').style.display = 'none';
            document.getElementById('sala-aula').style.display = 'block';
            document.getElementById('aula-titulo').innerText = nome;
            document.getElementById('video-link').innerHTML = `<a href="https://www.youtube.com/results?search_query=aula+de+${nome}" target="_blank" style="color:red">Ver vídeos de ${nome}</a>`;
            chamarIA(`Dê uma aula de ${nome} e crie 2 exercícios.`);
        }

        function voltar() { location.reload(); }

        async function chamarIA(prompt) {
            const aulaDiv = document.getElementById('aula-texto');
            const exDiv = document.getElementById('aula-exercicio');
            
            try {
                const r = await fetch("https://api-inference.huggingface.co/models/meta-llama/Meta-Llama-3-8B-Instruct", {
                    headers: { "Authorization": `Bearer ${CHAVE_MESTRA}`, "Content-Type": "application/json" },
                    method: "POST", body: JSON.stringify({ inputs: prompt }),
                });
                const d = await r.json();
                const texto = d[0].generated_text.split(prompt).pop();
                
                aulaDiv.innerHTML = texto.split("Exercício")[0];
                exDiv.innerHTML = texto.split("Exercício")[1] || "Leia a aula acima com atenção.";
            } catch(e) { aulaDiv.innerHTML = "Erro! Sua chave expirou ou é inválida."; }
        }

        async function perguntarIA() {
            const inp = document.getElementById('chat-input');
            const msgs = document.getElementById('chat-msgs');
            msgs.innerHTML += `<div><b>Você:</b> ${inp.value}</div>`;
            
            const r = await fetch("https://api-inference.huggingface.co/models/meta-llama/Meta-Llama-3-8B-Instruct", {
                headers: { "Authorization": `Bearer ${CHAVE_MESTRA}` },
                method: "POST", body: JSON.stringify({ inputs: inp.value }),
            });
            const d = await r.json();
            msgs.innerHTML += `<div style="color:var(--gold)"><b>IA:</b> ${d[0].generated_text.split(inp.value).pop()}</div>`;
            inp.value = '';
            msgs.scrollTop = msgs.scrollHeight;
        }
    </script>
</body>
</html>
